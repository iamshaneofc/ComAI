version: "3.9"

services:
  backend:
    build: .
    container_name: ai_commerce_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app

  postgres:
    image: postgres:15
    container_name: ai_commerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_commerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - redis
      - backend

volumes:
  postgres_data:
